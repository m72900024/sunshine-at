<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% if page.title == '首頁' %}
<title>社團法人璨陽輔助科技協會</title>
{% else %}
<title>{{ page.title }}｜社團法人璨陽輔助科技協會</title>
{% endif %}
<meta name="description" content="{{ page.description | default: site.description }}">
<meta property="og:title" content="{% if page.title == '首頁' %}社團法人璨陽輔助科技協會{% else %}{{ page.title }}｜社團法人璨陽輔助科技協會{% endif %}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/hero.png">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<link rel="icon" href="{{ site.baseurl }}/assets/images/logo.avif" type="image/avif">
<link rel="icon" href="{{ site.baseurl }}/assets/images/icon-donate.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
</head>
<body>

<a href="#main-content" class="sr-only skip-link">跳至主要內容</a>

{% include nav.html %}

<main id="main-content" tabindex="-1">
{{ content }}
</main>

{% include footer.html %}

<script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
